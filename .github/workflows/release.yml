name: Release

on:
  push:
    paths-ignore: [.pre-commit-config.yaml]
  pull_request:
    paths-ignore: [.pre-commit-config.yaml]
  schedule:
    - cron: 0 0 1 * *  # monthly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: >-
      Build wheels on ${{ matrix.os }}
      (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: manylinux
            arch: x86_64
          - os: ubuntu-24.04-arm
            platform: manylinux
            arch: aarch64
          - os: macos-15-intel
            platform: macos
            arch: x86_64
          - os: macos-latest
            platform: macos
            arch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD: cp310-${{ matrix.platform }}*

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-wheels-${{ matrix.platform }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build source distribution
        run: pipx run build --sdist

      - name: Upload source distribution
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-sdist
          path: dist/*.tar.gz

  publish:
    name: Upload release to PyPI
    needs: [build-wheels, build-sdist]
    if: github.repository_owner == 'form-dev' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/form-bin
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          merge-multiple: true
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create empty GitHub release
        uses: softprops/action-gh-release@v3
